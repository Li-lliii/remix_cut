services:
  web-api:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m uvicorn server:app --host 0.0.0.0 --port 7028
    env_file:
      - .env
    environment:
      BS_MEDIA_ASR_MODE: service
      BS_MEDIA_TTS_MODE: service
      BS_MEDIA_COMFY_MODE: service
      BS_MEDIA_ASR_SERVICE_HOST: host.docker.internal
      BS_MEDIA_TTS_SERVICE_HOST: host.docker.internal
      BS_MEDIA_COMFY_SERVICE_HOST: comfyui-gateway
      BS_MEDIA_COMFY_SERVICE_PORT: "7002"
      BS_MEDIA_REDIS_URL: redis://redis:6379/0
      BS_MEDIA_CELERY_BROKER_URL: amqp://bs_media:bs_media@rabbitmq:5672//
      BS_MEDIA_CELERY_RESULT_BACKEND: redis://redis:6379/0
      BS_MEDIA_MINIO_ENDPOINT: minio:9000
      BS_MEDIA_DATA_DIR: /app/metahuman_platform/data
      BS_MEDIA_UPLOADS_DIR: /app/metahuman_platform/uploads
      BS_MEDIA_WORK_DIR: /app/metahuman_platform/work
    ports:
      - "7027:7028"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      comfyui-gateway:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - platform_data:/app/metahuman_platform/data
      - platform_uploads:/app/metahuman_platform/uploads
      - platform_work:/app/metahuman_platform/work
      - ./config.yaml:/app/config.yaml:ro
      - ./workstream:/app/workstream:ro
    restart: unless-stopped

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A platform_app.infra.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      BS_MEDIA_ASR_MODE: service
      BS_MEDIA_TTS_MODE: service
      BS_MEDIA_COMFY_MODE: service
      BS_MEDIA_ASR_SERVICE_HOST: host.docker.internal
      BS_MEDIA_TTS_SERVICE_HOST: host.docker.internal
      BS_MEDIA_COMFY_SERVICE_HOST: comfyui-gateway
      BS_MEDIA_COMFY_SERVICE_PORT: "7002"
      BS_MEDIA_REDIS_URL: redis://redis:6379/0
      BS_MEDIA_CELERY_BROKER_URL: amqp://bs_media:bs_media@rabbitmq:5672//
      BS_MEDIA_CELERY_RESULT_BACKEND: redis://redis:6379/0
      BS_MEDIA_MINIO_ENDPOINT: minio:9000
      BS_MEDIA_DATA_DIR: /app/metahuman_platform/data
      BS_MEDIA_UPLOADS_DIR: /app/metahuman_platform/uploads
      BS_MEDIA_WORK_DIR: /app/metahuman_platform/work
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      comfyui-gateway:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - platform_data:/app/metahuman_platform/data
      - platform_uploads:/app/metahuman_platform/uploads
      - platform_work:/app/metahuman_platform/work
      - ./config.yaml:/app/config.yaml:ro
      - ./workstream:/app/workstream:ro
    restart: unless-stopped

  comfyui-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m uvicorn algorithm_services.comfy_gateway_service:app --host 0.0.0.0 --port 7002
    env_file:
      - .env
    environment:
      BS_MEDIA_COMFY_JOB_STORE_PATH: /app/metahuman_platform/work/comfy_gateway_jobs.json
      BS_MEDIA_REPLACE_BACKGROUND_WORKFLOW_PATH: /app/workstream/ai_transforms/replace_background.json
      BS_MEDIA_CONFIG_PATH: /app/config.yaml
    ports:
      - "7003:7002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - platform_uploads:/app/metahuman_platform/uploads  
      - platform_work:/app/metahuman_platform/work
      - ./config.yaml:/app/config.yaml:ro
      - ./workstream:/app/workstream:ro
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: bs_media
      RABBITMQ_DEFAULT_PASS: bs_media
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${BS_MEDIA_MINIO_ACCESS_KEY:-bs_media}
      MINIO_ROOT_PASSWORD: ${BS_MEDIA_MINIO_SECRET_KEY:-bs_media_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    env_file:
      - .env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${BS_MEDIA_MINIO_ACCESS_KEY:-bs_media} $${BS_MEDIA_MINIO_SECRET_KEY:-bs_media_password};
      mc mb --ignore-existing local/$${BS_MEDIA_MINIO_BUCKET:-bs-media};
      "

volumes:
  platform_data:
  platform_uploads:
  platform_work:
  rabbitmq_data:
  redis_data:
  minio_data:
